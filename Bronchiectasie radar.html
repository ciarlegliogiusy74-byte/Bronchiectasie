<!DOCTYPE html>
<html>
<head>
    <title>Exacerbation Radar</title>

    <style>
        body {
            font-size: 20px;
            font-family: Arial;
        }

        h1 {
            font-size: 34px;
        }

        label {
            font-size: 22px;
            font-weight: bold;
        }

        input, select, button {
            font-size: 18px;
            padding: 6px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 28px;
        }

        #consiglio {
            font-size: 20px;
        }
    </style>
</head>

<body>

<h1>Monitoraggio giornaliero</h1>

<label>Tosse (1-5):</label>
<input type="number" id="tosse" min="1" max="5"><br><br>

<label>Dispnea (MRC 1-5):</label>
<input type="number" id="mrc" min="1" max="5"><br><br>

<label>Fatica (1-5):</label>
<input type="number" id="fatica" min="1" max="5"><br><br>

<label>Peso (kg):</label>
<input type="number" id="peso"><br><br>

<label>Altezza (cm):</label>
<input type="number" id="altezza"><br><br>

<label>Espettorato:</label>
<select id="espettorato">
    <option value="trasparente">Trasparente</option>
    <option value="giallo">Giallo</option>
    <option value="verde">Verde</option>
    <option value="sangue">Sangue</option>
</select><br><br>

<label>Temperatura:</label>
<input type="number" id="febbre" step="0.1"><br><br>

<button onclick="calcola()">Calcola rischio</button>
<button onclick="mostraStorico()">Mostra andamento</button>

<h2 id="risultato"></h2>
<p id="consiglio"></p>

<pre id="storico"></pre>

<script>
function calcola() {
    let tosse = parseInt(document.getElementById("tosse").value);
    let mrc = parseInt(document.getElementById("mrc").value);
    let fatica = parseInt(document.getElementById("fatica").value);
    let peso = parseFloat(document.getElementById("peso").value);
    let altezza = parseFloat(document.getElementById("altezza").value);
    let espettorato = document.getElementById("espettorato").value;
    let febbre = parseFloat(document.getElementById("febbre").value);

    let rischio = "BASSO";
    let colore = "green";
    let messaggio = "";

    // BMI
    let bmi = peso / ((altezza / 100) * (altezza / 100));
    bmi = bmi.toFixed(1);

    // 🚨 SANGUE
    if (espettorato === "sangue") {
        rischio = "ALTO";
        colore = "red";
        messaggio = "🚨 Emottisi. Accesso urgente in Pronto Soccorso.";
    }

    // 🚨 DISPNEA GRAVE
    else if (mrc >= 4) {
        rischio = "ALTO";
        colore = "red";
        messaggio = "⚠️ Dispnea severa. Valutazione urgente.";
    }

    // ⚠️ FATICA ALTA → rischio infezione
    else if (fatica >= 4) {
        rischio = "MEDIO-ALTO";
        colore = "orange";
        messaggio = "⚠️ Fatica elevata: possibile aumento rischio infezione. Monitorare attentamente.";
    }

    // 🟠 RISCHIO MEDIO
    else if (tosse >= 3 || espettorato === "giallo" || espettorato === "verde") {
        rischio = "MEDIO";
        colore = "orange";
        messaggio = "⚠️ Segni di possibile riacutizzazione.";
    }

    // 🟢 STABILE
    else {
        messaggio = "✅ Situazione stabile.";
    }

    // 🍽️ BMI ALERT
    if (bmi < 20) {
        messaggio += " ⚠️ BMI basso (" + bmi + "): consigliata valutazione nutrizionista.";
        if (rischio === "BASSO") {
            rischio = "MEDIO";
            colore = "orange";
        }
    }

    document.getElementById("risultato").innerText = "Rischio: " + rischio + " | BMI: " + bmi;
    document.getElementById("risultato").style.color = colore;

    document.getElementById("consiglio").innerText = messaggio;

    salvaDati(tosse, mrc, fatica, espettorato, febbre, rischio, bmi);
}

function salvaDati(tosse, mrc, fatica, espettorato, febbre, rischio, bmi) {
    let oggi = new Date().toLocaleDateString();
    let dati = JSON.parse(localStorage.getItem("dati")) || [];

    dati.push({
        data: oggi,
        tosse,
        mrc,
        fatica,
        espettorato,
        febbre,
        rischio,
        bmi
    });

    localStorage.setItem("dati", JSON.stringify(dati));
}

function mostraStorico() {
    let dati = JSON.parse(localStorage.getItem("dati")) || [];
    let testo = "";

    dati.forEach(d => {
        testo += d.data +
        " | Tosse: " + d.tosse +
        " | MRC: " + d.mrc +
        " | Fatica: " + d.fatica +
        " | BMI: " + d.bmi +
        " | Rischio: " + d.rischio + "\n";
    });

    document.getElementById("storico").innerText = testo;
}
</script>

</body>
</html>
